<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main-container">
        <div id="display">
            <div id="text-container">
                <p id="mini-text"></p>
                <p id="main-text"></p>
            </div>
        </div>
        <div id="keypad">
                <button class="wide-btn normal-btn light-brown">Clear</button>
                <button class="normal-btn light-brown">
                    <svg xmlns="http://www.w3.org/2000/svg" width="50%" height="50%" fill="currentColor" class="bi bi-backspace" viewBox="0 0 16 16">
                    <path d="M5.83 5.146a.5.5 0 0 0 0 .708L7.975 8l-2.147 2.146a.5.5 0 0 0 .707.708l2.147-2.147 2.146 2.147a.5.5 0 0 0 .707-.708L9.39 8l2.146-2.146a.5.5 0 0 0-.707-.708L8.683 7.293 6.536 5.146a.5.5 0 0 0-.707 0z"/>
                    <path d="M13.683 1a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2h-7.08a2 2 0 0 1-1.519-.698L.241 8.65a1 1 0 0 1 0-1.302L5.084 1.7A2 2 0 0 1 6.603 1zm-7.08 1a1 1 0 0 0-.76.35L1 8l4.844 5.65a1 1 0 0 0 .759.35h7.08a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1z"/>
                    </svg>
                </button>
                <button class="normal-btn operators light-brown">&divide;</button>
                <button class="normal-btn digit">7</button>
                <button class="normal-btn digit">8</button>
                <button class="normal-btn digit">9</button>
                <button class="normal-btn operators light-brown">&times;</button>
                <button class="normal-btn digit">4</button>
                <button class="normal-btn digit">5</button>
                <button class="normal-btn digit">6</button>
                <button class="normal-btn operators light-brown">&minus;</button>
                <button class="normal-btn digit">1</button>
                <button class="normal-btn digit">2</button>
                <button class="normal-btn digit">3</button>
                <button class="normal-btn operators light-brown">+</button>
                <button class="wide-btn normal-btn">0</button>
                <button class="normal-btn">.</button>
                <button class="normal-btn light-brown" id="equal-btn">=</button>
        </div>
    </div>
    <script src="javascript.js"></script>
</body>
</html>
